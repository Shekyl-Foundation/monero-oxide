name: shekyl-wallet-rpc
description: Spawns a Shekyl Wallet-RPC for integration tests

inputs:
  version:
    description: "Shekyl daemon version (for wallet-rpc)"
    required: false
    default: latest

runs:
  using: "composite"
  steps:
    - name: Shekyl Wallet RPC Cache
      id: cache-shekyl-wallet-rpc
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
      with:
        path: shekyl-wallet-rpc
        key: shekyl-wallet-rpc-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Build Shekyl Wallet RPC
      if: steps.cache-shekyl-wallet-rpc.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Build from the same Shekyl source (already cloned by daemon step)
        if [ -d /tmp/shekyl-build ]; then
          cp /tmp/shekyl-build/build/release/bin/shekyl-wallet-rpc ./shekyl-wallet-rpc 2>/dev/null || \
          cp /tmp/shekyl-build/build/release/bin/shekyl-wallet-rpc ./shekyl-wallet-rpc 2>/dev/null || \
          echo "WARNING: wallet-rpc binary not found in build output"
        fi

    - name: Shekyl Wallet RPC
      shell: bash
      run: |
        ./shekyl-wallet-rpc --allow-mismatched-daemon-version \
          --daemon-address 0.0.0.0:18081 --daemon-login shekyl:oxide \
          --disable-rpc-login --rpc-bind-port 18082 \
          --wallet-dir ./ \
          --detach
