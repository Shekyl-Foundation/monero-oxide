name: shekyl-regtest
description: Spawns a regtest Shekyl daemon for integration tests

inputs:
  version:
    description: "Shekyl daemon version to download and run"
    required: false
    default: latest

runs:
  using: "composite"
  steps:
    - name: Shekyl Daemon Cache
      id: cache-shekyld
      uses: actions/cache@0400d5f644dc74513175e3cd8d07132dd4860809
      with:
        path: /usr/bin/shekyld
        key: shekyld-${{ runner.os }}-${{ runner.arch }}-${{ inputs.version }}

    - name: Build Shekyl Daemon from source
      if: steps.cache-shekyld.outputs.cache-hit != 'true'
      shell: bash
      run: |
        # Clone and build the Shekyl daemon for regtest
        # TODO: Replace with binary download once Shekyl releases are available
        git clone --depth 1 --branch feature/fcmp-plus-plus https://github.com/AnonCatalyst/Shekyl.git /tmp/shekyl-build
        cd /tmp/shekyl-build
        make -j$(nproc)
        sudo cp build/release/bin/shekyld /usr/bin/shekyld
        sudo chmod +x /usr/bin/shekyld

    - name: Shekyl Regtest Daemon
      shell: bash
      run: |
        PATH=$PATH:/usr/bin shekyld --non-interactive --regtest --offline --fixed-difficulty=1 \
          --no-zmq --rpc-bind-ip=0.0.0.0 --rpc-bind-port=18081 --confirm-external-bind \
          --rpc-access-control-origins "*" --disable-rpc-ban \
          --rpc-login=shekyl:oxide --log-level 2 \
          --detach
