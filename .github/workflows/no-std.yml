name: no-std build

on:
  push:
    branches:
      - main
    paths:
      - "monero-oxide/**"
      - "tests/no-std/**"

  pull_request:
    paths:
      - "monero-oxide/**"
      - "tests/no-std/**"

  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-26-intel, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # 6.0.0

      - name: Install Build Dependencies
        uses: ./.github/actions/build-dependencies

      - name: Get nightly version to use
        id: nightly
        shell: bash
        run: echo "version=$(cat .github/nightly-version)" >> $GITHUB_OUTPUT

      - name: Install RISC-V Toolchain
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt install -y gcc-riscv64-unknown-elf gcc-multilib
          elif [ "$RUNNER_OS" = "macOS" ]; then
            brew tap riscv-software-src/riscv
            brew install riscv-tools
          elif [ "$RUNNER_OS" = "Windows" ]; then
            /C/msys64/usr/bin/pacman.exe -Syu --noconfirm
            /C/msys64/usr/bin/pacman.exe -S --noconfirm mingw-w64-x86_64-riscv32-unknown-elf-gcc
          fi

      - name: Verify no-std builds
        shell: bash
        run: |
          rustup +${{ steps.nightly.outputs.version }} component add rust-src

          if [ "$RUNNER_OS" = "Linux" ]; then
            export CFLAGS=-I/usr/include
          elif [ "$RUNNER_OS" = "Windows" ]; then
            export PATH="$PATH:/C/msys64/mingw64/bin"
          fi

          cargo +${{ steps.nightly.outputs.version }} build --target riscv32imac-unknown-none-elf -Z build-std=core -p monero-oxide-no-std-tests
          cargo +${{ steps.nightly.outputs.version }} build --target riscv32imac-unknown-none-elf -Z build-std=core,alloc -p monero-oxide-no-std-tests --features "alloc"
